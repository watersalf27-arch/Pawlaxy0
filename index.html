<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyKitBox</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background-color: #F5F4F0; color: #1C1C1C; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const G = {
  bg: "#F5F4F0", surface: "#fff", accent: "#1A1A2E",
  red: "#E84545", text: "#1C1C1C", muted: "#787878", border: "#E2E0DA"
};

const WMO = {
  0:"☀️ Clear Sky", 1:"🌤️ Mainly Clear", 2:"⛅ Partly Cloudy", 3:"☁️ Overcast",
  45:"🌫️ Foggy", 48:"🌫️ Icy Fog", 51:"🌦️ Light Drizzle", 53:"🌦️ Drizzle",
  55:"🌧️ Heavy Drizzle", 61:"🌧️ Slight Rain", 63:"🌧️ Moderate Rain",
  65:"🌧️ Heavy Rain", 71:"🌨️ Slight Snow", 73:"🌨️ Moderate Snow",
  75:"❄️ Heavy Snow", 80:"🌦️ Showers", 81:"🌧️ Heavy Showers",
  82:"⛈️ Violent Showers", 95:"⛈️ Thunderstorm", 99:"⛈️ Severe Thunderstorm"
};

/* ── Nav Button ── */
function NavBtn({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:10,
      padding:"11px 14px", borderRadius:10, border:"none", width:"100%",
      background: active ? G.red : "transparent",
      color: active ? "#fff" : "rgba(255,255,255,.6)",
      fontFamily:"'DM Sans',sans-serif", fontSize:14,
      fontWeight: active ? 600 : 400, cursor:"pointer", textAlign:"left",
      marginBottom: 6
    }}>
      <span style={{
        width:32, height:32, borderRadius:8, fontSize:16,
        background: active ? "rgba(255,255,255,.2)" : "rgba(255,255,255,.1)",
        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0
      }}>{icon}</span>
      <span>{label}</span>
    </button>
  );
}

/* ── Status ── */
function Status({ msg, type }) {
  if (!msg) return null;
  const colors = {
    info: { background:"#EEF2FF", color:"#3730A3" },
    success: { background:"#ECFDF5", color:"#065F46" },
    error: { background:"#FEF2F2", color:"#991B1B" }
  };
  return (
    <div style={{ marginTop:14, padding:"12px 16px", borderRadius:9,
      fontSize:13.5, fontWeight:500, ...colors[type] }}>{msg}</div>
  );
}

/* ── TOOL 1: JPG to PDF ── */
function JpgToPdf() {
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const [pageFit, setPageFit] = useState("fit");
  const [status, setStatus] = useState(null);
  const [statusType, setStatusType] = useState("info");
  const [loading, setLoading] = useState(false);
  const [drag, setDrag] = useState(false);

  const handleFiles = (fileList) => {
    const arr = Array.from(fileList).filter(f => f.type.match(/image\/(jpeg|jpg|png)/i));
    if (!arr.length) { setStatus("JPG ya PNG images select karein."); setStatusType("error"); return; }
    setFiles(arr);
    setPreviews(arr.map(f => URL.createObjectURL(f)));
    setStatus(arr.length + " image(s) selected ✓"); setStatusType("info");
  };

  const convert = async () => {
    if (!files.length) { setStatus("Pehle images select karein."); setStatusType("error"); return; }
    if (!window.jspdf) { setStatus("PDF library load ho rahi hai, thoda wait karein…"); setStatusType("info"); return; }
    setLoading(true); setStatus("Images process ho rahi hain…"); setStatusType("info");
    try {
      const { jsPDF } = window.jspdf;
      const loadImg = (file) => new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => res({ url: e.target.result, w: img.naturalWidth, h: img.naturalHeight, type: file.type.includes("png") ? "PNG" : "JPEG" });
          img.onerror = () => rej(new Error("Image load failed"));
          img.src = e.target.result;
        };
        reader.onerror = () => rej(new Error("File read failed"));
        reader.readAsDataURL(file);
      });
      const imgs = await Promise.all(files.map(loadImg));
      let pdf = null;
      imgs.forEach(({ url, w, h, type }, i) => {
        const orient = w >= h ? "l" : "p";
        if (i === 0) { pdf = new jsPDF({ orientation: orient, unit: "px", format: [w, h] }); }
        else { pdf.addPage([w, h], orient); }
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();
        if (pageFit === "fit") {
          const s = Math.min(pw / w, ph / h);
          pdf.addImage(url, type, (pw - w*s)/2, (ph - h*s)/2, w*s, h*s);
        } else {
          pdf.addImage(url, type, 0, 0, pw, ph);
        }
      });
      pdf.save("DailyKitBox.pdf");
      setStatus("✅ PDF download ho gayi! " + files.length + " page(s)"); setStatusType("success");
    } catch(e) { setStatus("❌ Error: " + e.message); setStatusType("error"); }
    setLoading(false);
  };

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:24, fontWeight:800, letterSpacing:-.4 }}>JPG to PDF Converter</h2>
        <p style={{ fontSize:13, color:G.muted, marginTop:5 }}>Multiple images ko ek PDF mein convert karein.</p>
      </div>

      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:20, marginBottom:20 }}>
        <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Images Upload Karein</label>
        <div
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}
          style={{ border:`2px dashed ${drag ? G.accent : G.border}`,
            borderRadius:14, padding:"30px 10px", textAlign:"center",
            background: drag ? "#f0f0f8" : "#FAFAF8", position:"relative", cursor:"pointer" }}>
          <input type="file" accept="image/jpeg,image/jpg,image/png" multiple
            onChange={e => handleFiles(e.target.files)}
            style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }} />
          <div style={{ fontSize:32, marginBottom:10 }}>📁</div>
          <div style={{ fontWeight:600, fontSize:14 }}>Click karein ya drag & drop karein</div>
        </div>

        {previews.length > 0 && (
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:14 }}>
            {previews.map((src, i) => (
              <img key={i} src={src} alt="" style={{ width:60, height:60, objectFit:"cover", borderRadius:8, border:`2px solid ${G.border}` }} />
            ))}
          </div>
        )}

        <div style={{ marginTop:14 }}>
          <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Page Fit</label>
          <select value={pageFit} onChange={e => setPageFit(e.target.value)}
            style={{ width:"100%", padding:"11px 14px", border:`1.5px solid ${G.border}`,
              borderRadius:9, fontFamily:"'DM Sans',sans-serif", fontSize:14, color:G.text, background:"#FAFAF8" }}>
            <option value="fit">Fit to page (Aspect Ratio)</option>
            <option value="fill">Fill page (Stretch)</option>
          </select>
        </div>

        <button onClick={convert} disabled={loading}
          style={{ width:"100%", padding:"13px 20px", marginTop:16, background: loading ? "#555" : G.accent, color:"#fff", border:"none", borderRadius:10, fontSize:14, fontWeight:600, cursor: "pointer" }}>
          {loading ? "⏳ Converting…" : "⬇️ Convert & Download"}
        </button>
        <Status msg={status} type={statusType} />
      </div>
    </div>
  );
}

/* ── TOOL 2: Weather ── */
function Weather() {
  const [city, setCity] = useState("");
  const [status, setStatus] = useState(null);
  const [statusType, setStatusType] = useState("info");
  const [weather, setWeather] = useState(null);
  const [loading, setLoading] = useState(false);

  const search = async () => {
    if (!city.trim()) { setStatus("City ka naam likhein."); setStatusType("error"); return; }
    setLoading(true); setWeather(null); setStatus('🔍 Searching...'); setStatusType("info");
    try {
      const gr = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=en&format=json");
      const gd = await gr.json();
      if (!gd.results?.length) { setStatus("❌ City nahi mili."); setStatusType("error"); setLoading(false); return; }
      const { latitude, longitude, name, country } = gd.results[0];
      const wr = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation&wind_speed_unit=mph&timezone=auto`);
      const wd = await wr.json();
      const c = wd.current;
      setWeather({ name, country, temp: Math.round(c.temperature_2m), feels: Math.round(c.apparent_temperature), desc: WMO[c.weather_code] || "Unknown", humidity: c.relative_humidity_2m, wind: Math.round(c.wind_speed_10m), rain: c.precipitation });
      setStatus(null);
    } catch { setStatus("❌ Network error."); setStatusType("error"); }
    setLoading(false);
  };

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:24, fontWeight:800 }}>Real-Time Weather</h2>
      </div>
      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:20, marginBottom:20 }}>
        <div style={{ display:"flex", gap:10 }}>
          <input value={city} onChange={e => setCity(e.target.value)} onKeyDown={e => e.key === "Enter" && search()} placeholder="Karachi, London..." style={{ flex:1, padding:"11px 14px", border:`1.5px solid ${G.border}`, borderRadius:9, fontSize:14 }} />
          <button onClick={search} disabled={loading} style={{ padding:"11px 20px", background: G.accent, color:"#fff", border:"none", borderRadius:9, fontWeight:600 }}>Go</button>
        </div>
        <Status msg={status} type={statusType} />
      </div>

      {weather && (
        <div style={{ background:"linear-gradient(135deg,#1A1A2E,#16213E)", borderRadius:14, padding:24, color:"#fff" }}>
          <div style={{ fontSize:22, fontWeight:800 }}>{weather.name}, {weather.country}</div>
          <div style={{ fontSize:48, fontWeight:800, margin:"10px 0" }}>{weather.temp}°C</div>
          <div style={{ fontSize:14, color:"rgba(255,255,255,.8)" }}>{weather.desc}</div>
        </div>
      )}
    </div>
  );
}

/* ── TOOL 3: Mortgage ── */
function Mortgage() {
  const [price, setPrice] = useState(350000);
  const [deposit, setDeposit] = useState(70000);
  const [rate, setRate] = useState(5.25);
  const [term, setTerm] = useState(25);
  const [result, setResult] = useState(null);

  const calc = () => {
    const P = price - deposit;
    if (P <= 0 || !rate || !term) return;
    const r = rate / 100 / 12;
    const n = term * 12;
    const monthly = r === 0 ? P / n : P * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
    setResult({ monthly, loan: P, totalPaid: monthly * n, interest: monthly * n - P });
  };

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:24, fontWeight:800 }}>Mortgage Calculator</h2>
      </div>
      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:20 }}>
        <div style={{ marginBottom:12 }}><label style={{display:"block", fontSize:12, fontWeight:600}}>Price</label><input type="number" value={price} onChange={e=>setPrice(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
        <div style={{ marginBottom:12 }}><label style={{display:"block", fontSize:12, fontWeight:600}}>Deposit</label><input type="number" value={deposit} onChange={e=>setDeposit(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
        <div style={{ display:"flex", gap:10, marginBottom:12 }}>
          <div><label style={{display:"block", fontSize:12, fontWeight:600}}>Rate (%)</label><input type="number" value={rate} step="0.05" onChange={e=>setRate(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
          <div><label style={{display:"block", fontSize:12, fontWeight:600}}>Years</label><input type="number" value={term} onChange={e=>setTerm(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
        </div>
        <button onClick={calc} style={{ width:"100%", padding:12, background:G.accent, color:"#fff", border:"none", borderRadius:8, fontWeight:600 }}>Calculate</button>

        {result && (
          <div style={{ background:"#1A1A2E", color:"#fff", padding:16, borderRadius:10, marginTop:14, textAlign:"center" }}>
            <div style={{ fontSize:12, color:"#ccc" }}>Monthly Repayment</div>
            <div style={{ fontSize:28, fontWeight:800 }}>£{Math.round(result.monthly).toLocaleString()}</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── TOOL 4: Tip Calculator ── */
function TipCalc() {
  const [bill, setBill] = useState(50);
  const [tipPct, setTipPct] = useState(15);
  const [people, setPeople] = useState(2);

  const tipAmt = (bill * tipPct / 100) || 0;
  const total = (bill || 0) + tipAmt;
  const perPerson = total / (people || 1);

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:24, fontWeight:800 }}>Tip Calculator</h2>
      </div>
      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:20 }}>
        <div style={{ marginBottom:12 }}><label style={{display:"block", fontSize:12, fontWeight:600}}>Bill ($)</label><input type="number" value={bill} onChange={e=>setBill(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
        <div style={{ marginBottom:12 }}><label style={{display:"block", fontSize:12, fontWeight:600}}>Tip (%)</label><input type="number" value={tipPct} onChange={e=>setTipPct(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>
        <div style={{ marginBottom:16 }}><label style={{display:"block", fontSize:12, fontWeight:600}}>People</label><input type="number" value={people} onChange={e=>setPeople(+e.target.value)} style={{width:"100%", padding:10, borderRadius:8, border:`1px solid ${G.border}`}} /></div>

        <div style={{ background:"#1A1A2E", color:"#fff", padding:16, borderRadius:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}><span>Per Person Total:</span><strong>${perPerson.toFixed(2)}</strong></div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#ccc" }}><span>Total Tip:</span><span>${tipAmt.toFixed(2)}</span></div>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN CONTAINER (Mobile Responsive Flex Direction) ── */
function App() {
  const [activeTab, setActiveTab] = useState("jpg2pdf");

  // CSS for responsive design via simple dynamic window width
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", minHeight: "100vh" }}>
      {/* Navigation Header / Sidebar */}
      <div style={{
        width: isMobile ? "100%" : 260, background: G.accent, padding: 20, display: "flex", flexDirection: "column", flexShrink: 0
      }}>
        <div style={{ marginBottom: isMobile ? 14 : 24 }}>
          <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: "#fff" }}>
            DailyKitBox<span style={{ color: G.red }}>.</span>
          </h1>
        </div>

        <nav style={{ display: isMobile ? "grid" : "block", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
          <NavBtn icon="📄" label="Images to PDF" active={activeTab === "jpg2pdf"} onClick={() => setActiveTab("jpg2pdf")} />
          <NavBtn icon="🌤️" label="Weather" active={activeTab === "weather"} onClick={() => setActiveTab("weather")} />
          <NavBtn icon="🏦" label="Mortgage" active={activeTab === "mortgage"} onClick={() => setActiveTab("mortgage")} />
          <NavBtn icon="🪙" label="Tip Calc" active={activeTab === "tip"} onClick={() => setActiveTab("tip")} />
        </nav>
      </div>

      {/* Content Area */}
      <main style={{ flex: 1, padding: isMobile ? 20 : 40, overflowY: "auto", background: G.bg }}>
        {activeTab === "jpg2pdf" && <JpgToPdf />}
        {activeTab === "weather" && <Weather />}
        {activeTab === "mortgage" && <Mortgage />}
        {activeTab === "tip" && <TipCalc />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
