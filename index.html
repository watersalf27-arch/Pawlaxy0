<script type="text/babel">
const { useState, useEffect } = React;

const G = {
  bg: "#F5F4F0", surface: "#fff", accent: "#1A1A2E",
  red: "#E84545", text: "#1C1C1C", muted: "#787878", border: "#E2E0DA"
};

const WMO = {
  0:"☀️ Clear Sky", 1:"🌤️ Mainly Clear", 2:"⛅ Partly Cloudy", 3:"☁️ Overcast",
  45:"🌫️ Foggy", 48:"🌫️ Icy Fog", 51:"🌦️ Light Drizzle", 53:"🌦️ Drizzle",
  55:"🌧️ Heavy Drizzle", 61:"🌧️ Slight Rain", 63:"🌧️ Moderate Rain",
  65:"🌧️ Heavy Rain", 71:"🌨️ Slight Snow", 73:"🌨️ Moderate Snow",
  75:"❄️ Heavy Snow", 80:"🌦️ Showers", 81:"🌧️ Heavy Showers",
  82:"⛈️ Violent Showers", 95:"⛈️ Thunderstorm", 99:"⛈️ Severe Thunderstorm"
};

/* ── Nav Button ── */
function NavBtn({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:10,
      padding:"11px 14px", borderRadius:10, border:"none", width:"100%",
      background: active ? G.red : "transparent",
      color: active ? "#fff" : "rgba(255,255,255,.6)",
      fontFamily:"'DM Sans',sans-serif", fontSize:14,
      fontWeight: active ? 600 : 400, cursor:"pointer", textAlign:"left",
      marginBottom: 6
    }}>
      <span style={{
        width:32, height:32, borderRadius:8, fontSize:16,
        background: active ? "rgba(255,255,255,.2)" : "rgba(255,255,255,.1)",
        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0
      }}>{icon}</span>
      <span>{label}</span>
    </button>

}

/* ── Status ── */
function Status({ msg, type }) {
  if (!msg) return null;
  const colors = {
    info: { background:"#EEF2FF", color:"#3730A3" },
    success: { background:"#ECFDF5", color:"#065F46" },
    error: { background:"#FEF2F2", color:"#991B1B" }
  };
  return (
    <div style={{ marginTop:14, padding:"12px 16px", borderRadius:9,
      fontSize:13.5, fontWeight:500, ...colors[type] }}>{msg}</div>
  );
}

/* ── Input ── */
function Input({ type="text", value, onChange, placeholder, step, min }) {
  return (
    <input type={type} value={value} onChange={onChange}
      placeholder={placeholder} step={step} min={min}
      style={{ width:"100%", padding:"11px 14px",
        border:`1.5px solid ${G.border}`, borderRadius:9,
        fontFamily:"'DM Sans',sans-serif", fontSize:14,
        color:G.text, background:"#FAFAF8", outline:"none", boxSizing:"border-box" }}
      onFocus={e => e.target.style.borderColor = G.accent}
      onBlur={e => e.target.style.borderColor = G.border}
    />
  );
}

/* ══════════════════════════════════════════
   TOOL 1: JPG to PDF
══════════════════════════════════════════ */
function JpgToPdf() {
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const [pageFit, setPageFit] = useState("fit");
  const [status, setStatus] = useState(null);
  const [statusType, setStatusType] = useState("info");
  const [loading, setLoading] = useState(false);
  const [drag, setDrag] = useState(false);

  const handleFiles = (fileList) => {
    const arr = Array.from(fileList).filter(f => f.type.match(/image\/(jpeg|jpg|png)/i));
    if (!arr.length) { setStatus("JPG ya PNG images select karein."); setStatusType("error"); return; }
    setFiles(arr);
    setPreviews(arr.map(f => URL.createObjectURL(f)));
    setStatus(arr.length + " image(s) selected ✓"); setStatusType("info");
  };

  const convert = async () => {
    if (!files.length) { setStatus("Pehle images select karein."); setStatusType("error"); return; }
    if (!window.jspdf) { setStatus("PDF library load ho rahi hai, thoda wait karein…"); setStatusType("info"); return; }
    setLoading(true); setStatus("Images process ho rahi hain…"); setStatusType("info");
    try {
      const { jsPDF } = window.jspdf;
      const loadImg = (file) => new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => res({ url: e.target.result, w: img.naturalWidth, h: img.naturalHeight, type: file.type.includes("png") ? "PNG" : "JPEG" });
          img.onerror = () => rej(new Error("Image load failed"));
          img.src = e.target.result;
        };
        reader.onerror = () => rej(new Error("File read failed"));
        reader.readAsDataURL(file);
      });
      const imgs = await Promise.all(files.map(loadImg));
      let pdf = null;
      imgs.forEach(({ url, w, h, type }, i) => {
        const orient = w >= h ? "l" : "p";
        if (i === 0) { pdf = new jsPDF({ orientation: orient, unit: "px", format: [w, h] }); }
        else { pdf.addPage([w, h], orient); }
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();
        if (pageFit === "fit") {
          const s = Math.min(pw / w, ph / h);
          pdf.addImage(url, type, (pw - w*s)/2, (ph - h*s)/2, w*s, h*s);
        } else {
          pdf.addImage(url, type, 0, 0, pw, ph);
        }
      });
      pdf.save("DailyKitBox.pdf");
      setStatus("✅ PDF download ho gayi! " + files.length + " page(s)"); setStatusType("success");
    } catch(e) { setStatus("❌ Error: " + e.message); setStatusType("error"); }
    setLoading(false);
  };

  return (
    <div>
      <div style={{ marginBottom:32 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, letterSpacing:-.4 }}>JPG to PDF Converter</h2>
        <p style={{ fontSize:14, color:G.muted, marginTop:5 }}>Multiple images ko ek PDF mein convert karein — browser mein hi.</p>
      </div>

      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:28, marginBottom:20 }}>
        <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Images Upload Karein</label>

        <div
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}
          style={{ border:`2px dashed ${drag ? G.accent : G.border}`,
            borderRadius:14, padding:"40px 20px", textAlign:"center",
            background: drag ? "#f0f0f8" : "#FAFAF8", position:"relative", cursor:"pointer" }}>
          <input type="file" accept="image/jpeg,image/jpg,image/png" multiple
            onChange={e => handleFiles(e.target.files)}
            style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }} />
          <div style={{ fontSize:40, marginBottom:10 }}>📁</div>
          <div style={{ fontWeight:600, fontSize:15 }}>Click karein ya drag & drop karein</div>
          <div style={{ fontSize:13, color:G.muted, marginTop:5 }}>JPG, PNG • Multiple files allowed</div>
        </div>

        {previews.length > 0 && (
          <div style={{ display:"flex", flexWrap:"wrap", gap:10, marginTop:14 }}>
            {previews.map((src, i) => (
              <img key={i} src={src} alt="" style={{ width:80, height:80, objectFit:"cover", borderRadius:8, border:`2px solid ${G.border}` }} />
            ))}
          </div>
        )}

        <div style={{ marginTop:18 }}>
          <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Page Fit</label>
          <select value={pageFit} onChange={e => setPageFit(e.target.value)}
            style={{ width:"100%", padding:"11px 14px", border:`1.5px solid ${G.border}`,
              borderRadius:9, fontFamily:"'DM Sans',sans-serif", fontSize:14,
              color:G.text, background:"#FAFAF8", outline:"none" }}>
            <option value="fit">Fit to page (aspect ratio maintain)</option>
            <option value="fill">Fill page (stretch)</option>
          </select>
        </div>

        <button onClick={convert} disabled={loading}
          style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            width:"100%", padding:"13px 20px", marginTop:20,
            background: loading ? "#555" : G.accent, color:"#fff", border:"none",
            borderRadius:10, fontFamily:"'DM Sans',sans-serif",
            fontSize:14, fontWeight:600, cursor: loading ? "not-allowed" : "pointer" }}>
          {loading ? "⏳ Converting…" : "⬇️ Convert & Download PDF"}
        </button>

        <Status msg={status} type={statusType} />
      </div>
    </div>
  );
}

/* ── Weather Tool ── */
function Weather() {
  const [city, setCity] = useState("");
  const [status, setStatus] = useState(null);
  const [statusType, setStatusType] = useState("info");
  const [weather, setWeather] = useState(null);
  const [loading, setLoading] = useState(false);

  const search = async () => {
    if (!city.trim()) { setStatus("City ka naam likhein."); setStatusType("error"); return; }
    setLoading(true); setWeather(null);
    setStatus('🔍 "' + city + '" dhundh raha hai…'); setStatusType("info");
    try {
      const gr = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=en&format=json");
      const gd = await gr.json();
      if (!gd.results?.length) { setStatus("❌ City nahi mili. Dobara try karein."); setStatusType("error"); setLoading(false); return; }
      const { latitude, longitude, name, country } = gd.results[0];
      const wr = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + latitude + "&longitude=" + longitude +
        "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation&wind_speed_unit=mph&timezone=auto");
      const wd = await wr.json();
      const c = wd.current;
      setWeather({ name, country, temp: Math.round(c.temperature_2m), feels: Math.round(c.apparent_temperature),
        desc: WMO[c.weather_code] || "Unknown", humidity: c.relative_humidity_2m,
        wind: Math.round(c.wind_speed_10m), rain: c.precipitation });
      setStatus(null);
    } catch { setStatus("❌ Network error. Internet check karein."); setStatusType("error"); }
    setLoading(false);
  };

  return (
    <div>
      <div style={{ marginBottom:32 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, letterSpacing:-.4 }}>Real-Time Weather</h2>
        <p style={{ fontSize:14, color:G.muted, marginTop:5 }}>Kisi bhi city ka live weather dekhein.</p>
      </div>

      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:28, marginBottom:20 }}>
        <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>City Ka Naam</label>
        <div style={{ display:"flex", gap:12 }}>
          <input value={city} onChange={e => setCity(e.target.value)}
            onKeyDown={e => e.key === "Enter" && search()}
            placeholder="e.g. Karachi, London, Dubai…"
            style={{ flex:1, padding:"11px 14px", border:`1.5px solid ${G.border}`, borderRadius:9,
              fontFamily:"'DM Sans',sans-serif", fontSize:14, color:G.text,
              background:"#FAFAF8", outline:"none" }} />
          <button onClick={search} disabled={loading}
            style={{ padding:"11px 24px", background: loading ? "#555" : G.accent, color:"#fff",
              border:"none", borderRadius:9, fontFamily:"'DM Sans',sans-serif",
              fontSize:14, fontWeight:600, cursor: loading ? "not-allowed" : "pointer", flexShrink:0 }}>
            {loading ? "…" : "Search"}
          </button>
        </div>
        <Status msg={status} type={statusType} />
      </div>

      {weather && (
        <div style={{ background:"linear-gradient(135deg,#1A1A2E,#16213E,#0F3460)",
          borderRadius:14, padding:32, color:"#fff" }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:26, fontWeight:800 }}>{weather.name}</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,.5)", marginTop:2 }}>{weather.country}</div>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:64, fontWeight:800, lineHeight:1, margin:"16px 0 8px" }}>{weather.temp}°C</div>
          <div style={{ fontSize:15, color:"rgba(255,255,255,.75)" }}>{weather.desc}</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginTop:24, paddingTop:20, borderTop:"1px solid rgba(255,255,255,.1)" }}>
            {[
              ["💧 Humidity", weather.humidity + "%"],
              ["💨 Wind Speed", weather.wind + " mph"],
              ["🌡️ Feels Like", weather.feels + "°C"],
              ["🌧️ Rain (1h)", weather.rain + " mm"]
            ].map(([label, val]) => (
              <div key={label} style={{ background:"rgba(255,255,255,.08)", borderRadius:10, padding:"12px 14px" }}>
                <div style={{ fontSize:11, color:"rgba(255,255,255,.5)", textTransform:"uppercase", letterSpacing:1 }}>{label}</div>
                <div style={{ fontSize:20, fontWeight:700, marginTop:4 }}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Mortgage Tool ── */
function Mortgage() {
  const [price, setPrice] = useState(350000);
  const [deposit, setDeposit] = useState(70000);
  const [rate, setRate] = useState(5.25);
  const [term, setTerm] = useState(25);
  const [result, setResult] = useState(null);

  const calc = () => {
    const P = price - deposit;
    if (P <= 0 || !rate || !term) return;
    const r = rate / 100 / 12;
    const n = term * 12;
    const monthly = r === 0 ? P / n : P * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
    setResult({ monthly, loan: P, totalPaid: monthly * n, interest: monthly * n - P });
  };

  const fmt = v => "£" + Math.round(v).toLocaleString("en-GB");

  const fieldStyle = { marginBottom:18 };
  const labelStyle = { display:"block", fontSize:13, fontWeight:600, marginBottom:7 };
  const inputStyle = { width:"100%", padding:"11px 14px", border:`1.5px solid ${G.border}`,
    borderRadius:9, fontFamily:"'DM Sans',sans-serif", fontSize:14,
    color:G.text, background:"#FAFAF8", outline:"none", boxSizing:"border-box" };

  return (
    <div>
      <div style={{ marginBottom:32 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, letterSpacing:-.4 }}>Mortgage Calculator</h2>
        <p style={{ fontSize:14, color:G.muted, marginTop:5 }}>Monthly repayment estimate karein.</p>
      </div>

      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:28, maxWidth:520 }}>
        <div style={fieldStyle}>
          <label style={labelStyle}>Property Price (£/$)</label>
          <input type="number" value={price} onChange={e => setPrice(+e.target.value)} style={inputStyle} />
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Deposit / Down Payment</label>
          <input type="number" value={deposit} onChange={e => setDeposit(+e.target.value)} style={inputStyle} />
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <div style={fieldStyle}>
            <label style={labelStyle}>Interest Rate (%)</label>
            <input type="number" value={rate} step="0.05" onChange={e => setRate(+e.target.value)} style={inputStyle} />
          </div>
          <div style={fieldStyle}>
            <label style={labelStyle}>Term (Years)</label>
            <input type="number" value={term} onChange={e => setTerm(+e.target.value)} style={inputStyle} />
          </div>
        </div>

        <button onClick={calc}
          style={{ width:"100%", padding:"13px 20px", background:G.accent, color:"#fff",
            border:"none", borderRadius:10, fontFamily:"'DM Sans',sans-serif",
            fontSize:14, fontWeight:600, cursor:"pointer" }}>
          Monthly Payment Calculate Karein
        </button>

        {result && (
          <div style={{ background:G.accent, color:"#fff", borderRadius:12, padding:24, marginTop:20, textAlign:"center" }}>
            <div style={{ fontSize:13, color:"rgba(255,255,255,.6)" }}>Monthly Repayment</div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:44, fontWeight:800, marginTop:6 }}>{fmt(result.monthly)}</div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,.45)", marginTop:4 }}>{term} saal | Loan: {fmt(result.loan)}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginTop:16 }}>
              {[["Loan Amount", fmt(result.loan)], ["Total Paid", fmt(result.totalPaid)], ["Total Interest", fmt(result.interest)]].map(([l, v]) => (
                <div key={l} style={{ background:"rgba(255,255,255,.08)", borderRadius:8, padding:12 }}>
                  <div style={{ fontSize:15, fontWeight:700 }}>{v}</div>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,.5)", marginTop:3, textTransform:"uppercase" }}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Tip Calculator Tool ── */
function TipCalc() {
  const [bill, setBill] = useState(50);
  const [tipPct, setTipPct] = useState(15);
  const [people, setPeople] = useState(2);
  const [active, setActive] = useState(15);
  const [customTip, setCustomTip] = useState("");

  const actualTipPct = active === "custom" ? (parseFloat(customTip) || 0) : tipPct;
  const tipAmt = (bill * actualTipPct / 100) || 0;
  const total = (bill || 0) + tipAmt;
  const perPerson = total / (people || 1);
  const tipPerPerson = tipAmt / (people || 1);
  const fmt = v => "$" + v.toFixed(2);

  const inputStyle = { width:"100%", padding:"11px 14px", border:`1.5px solid ${G.border}`,
    borderRadius:9, fontFamily:"'DM Sans',sans-serif", fontSize:14,
    color:G.text, background:"#FAFAF8", outline:"none", boxSizing:"border-box" };

  return (
    <div>
      <div style={{ marginBottom:32 }}>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, letterSpacing:-.4 }}>Tip Calculator</h2>
        <p style={{ fontSize:14, color:G.muted, marginTop:5 }}>Bill split karein aur tip calculate karein.</p>
      </div>

      <div style={{ background:G.surface, border:`1px solid ${G.border}`, borderRadius:14, padding:28, maxWidth:480 }}>
        <div style={{ marginBottom:18 }}>
          <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Bill Amount ($)</label>
          <input type="number" value={bill} step="0.01" onChange={e => setBill(parseFloat(e.target.value) || 0)} style={inputStyle} />
        </div>

        <div style={{ marginBottom:18 }}>
          <label style={{ display:"block", fontSize:13, fontWeight:600, marginBottom:8 }}>Tip Percentage</label>
          <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
            {[10, 15, 18, 20, 25].map(p => (
              <button key={p} onClick={() => { setTipPct(p); setActive(p); }}
                style={{ flex:1, minWidth:50, padding:"9px
