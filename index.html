<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyKitBox - Free Online Utility Tools</title>
    <!-- jsPDF Library for JPG to PDF Conversion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        header p {
            color: #6b7280;
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background-color: #e5e7eb;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Tools Container */
        .tool-content {
            display: none;
            background: var(--card-bg);
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .tool-content.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="number"], input[type="file"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button.action-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button.action-btn:hover {
            background-color: var(--primary-hover);
        }

        /* Results Box */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9fafb;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .bold-text {
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Word Counter Custom */
        .counter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .counter-card {
            background: #f3f4f6;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
        }
        .counter-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }
    </style>
</head>
    <meta name="google-site-verification" content="4QCQtwQgwvAg1Jw0qgKFQbRc2Klh2y21fdqAzTIiBh0" />
<body>

    <header>
        <h1>DailyKitBox</h1>
        <p>Your Daily Essential Online Micro-Tools Suite</p>
    </header>

    <!-- Navigation Tabs -->
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('jpg-to-pdf')">JPG to PDF</button>
        <button class="tab-btn" onclick="switchTab('mortgage-calc')">Mortgage Calculator</button>
        <button class="tab-btn" onclick="switchTab('tip-calc')">Tip Calculator</button>
        <button class="tab-btn" onclick="switchTab('word-counter')">Word Counter</button>
    </div>

    <!-- 1. JPG TO PDF TOOL -->
    <div id="jpg-to-pdf" class="tool-content active">
        <h2>JPG to PDF Converter</h2>
        <div class="input-group">
            <label>Select JPG Images:</label>
            <input type="file" id="imageInput" accept="image/jpeg, image/jpg" multiple>
        </div>
        <button class="action-btn" onclick="convertToPDF()">Convert & Download PDF</button>
    </div>

    <!-- 2. MORTGAGE CALCULATOR TOOL -->
    <div id="mortgage-calc" class="tool-content">
        <h2>Mortgage Calculator</h2>
        <div class="input-group">
            <label>Home Price ($):</label>
            <input type="number" id="homePrice" value="300000">
        </div>
        <div class="input-group">
            <label>Down Payment ($):</label>
            <input type="number" id="downPayment" value="60000">
        </div>
        <div class="input-group">
            <label>Loan Term (Years):</label>
            <select id="loanTerm">
                <option value="30">30 Years</option>
                <option value="20">20 Years</option>
                <option value="15">15 Years</option>
                <option value="10">10 Years</option>
            </select>
        </div>
        <div class="input-group">
            <label>Interest Rate (%):</label>
            <input type="number" id="interestRate" value="6.5" step="0.01">
        </div>
        <button class="action-btn" onclick="calculateMortgage()">Calculate Payment</button>
        
        <div class="result-box" id="mortgageResult" style="display:none;">
            <div class="result-item"><span>Loan Amount:</span> <span id="resLoanAmount" class="bold-text">$0.00</span></div>
            <div class="result-item"><span>Monthly Payment (P&I):</span> <span id="resMonthlyPayment" class="bold-text">$0.00</span></div>
        </div>
    </div>

    <!-- 3. TIP CALCULATOR TOOL -->
    <div id="tip-calc" class="tool-content">
        <h2>Tip Calculator</h2>
        <div class="input-group">
            <label>Bill Amount ($):</label>
            <input type="number" id="billAmount" placeholder="e.g. 50.00" step="0.01">
        </div>
        <div class="input-group">
            <label>Tip Percentage (%):</label>
            <select id="tipPercentage">
                <option value="15">15% (Standard)</option>
                <option value="18">18% (Good)</option>
                <option value="20" selected>20% (Great)</option>
                <option value="25">25% (Excellent)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Number of People:</label>
            <input type="number" id="numPeople" value="1" min="1">
        </div>
        <button class="action-btn" onclick="calculateTip()">Calculate Tip</button>

        <div class="result-box" id="tipResult" style="display:none;">
            <div class="result-item"><span>Total Tip:</span> <span id="resTotalTip">$0.00</span></div>
            <div class="result-item"><span>Total Bill (with Tip):</span> <span id="resTotalBill">$0.00</span></div>
            <div class="result-item"><span>Per Person Share:</span> <span id="resPerPerson" class="bold-text">$0.00</span></div>
        </div>
    </div>

    <!-- 4. WORD COUNTER TOOL -->
    <div id="word-counter" class="tool-content">
        <h2>Word Counter</h2>
        <div class="input-group">
            <label>Paste or Type Your Text Below:</label>
            <textarea id="textInput" rows="10" placeholder="Start typing here..." oninput="countText()"></textarea>
        </div>
        <div class="counter-grid">
            <div class="counter-card">
                <div class="counter-num" id="wordCount">0</div>
                <div>Words</div>
            </div>
            <div class="counter-card">
                <div class="counter-num" id="charCount">0</div>
                <div>Characters</div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tool-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 1. JPG to PDF Logic
        async function convertToPDF() {
            const { jsPDF } = window.jspdf;
            const fileInput = document.getElementById('imageInput');
            
            if (fileInput.files.length === 0) {
                alert('Please select at least one JPG image.');
                return;
            }

            const pdf = new jsPDF();
            
            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const fileData = await readFileAsDataURL(file);
                
                if (i > 0) pdf.addPage();
                
                // Adding image to fit full page roughly
                pdf.addImage(fileData, 'JPEG', 10, 10, 190, 0);
            }
            
            pdf.save('DailyKitBox-converted.pdf');
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (end) => resolve(end.target.result);
                reader.readAsDataURL(file);
            });
        }

        // 2. Mortgage Calculator Logic
        function calculateMortgage() {
            const homePrice = parseFloat(document.getElementById('homePrice').value);
            const downPayment = parseFloat(document.getElementById('downPayment').value);
            const loanTerm = parseInt(document.getElementById('loanTerm').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value) / 100 / 12;

            const loanAmount = homePrice - downPayment;
            const numberOfPayments = loanTerm * 12;

            let monthlyPayment = 0;
            if (interestRate === 0) {
                monthlyPayment = loanAmount / numberOfPayments;
            } else {
                monthlyPayment = loanAmount * (interestRate * Math.pow(1 + interestRate, numberOfPayments)) / (Math.pow(1 + interestRate, numberOfPayments) - 1);
            }

            document.getElementById('resLoanAmount').innerText = '$' + loanAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('resMonthlyPayment').innerText = '$' + monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('mortgageResult').style.display = 'block';
        }

        // 3. Tip Calculator Logic
        function calculateTip() {
            const bill = parseFloat(document.getElementById('billAmount').value);
            const tipPercent = parseFloat(document.getElementById('tipPercentage').value);
            const people = parseInt(document.getElementById('numPeople').value);

            if (isNaN(bill) || bill <= 0) {
                alert('Please enter a valid bill amount.');
                return;
            }

            const totalTip = bill * (tipPercent / 100);
            const totalBill = bill + totalTip;
            const perPerson = totalBill / people;

            document.getElementById('resTotalTip').innerText = '$' + totalTip.toFixed(2);
            document.getElementById('resTotalBill').innerText = '$' + totalBill.toFixed(2);
            document.getElementById('resPerPerson').innerText = '$' + perPerson.toFixed(2);
            document.getElementById('tipResult').style.display = 'block';
        }

        // 4. Word Counter Logic
        function countText() {
            const text = document.getElementById('textInput').value;
            
            // Character count
            document.getElementById('charCount').innerText = text.length;
            
            // Word count
            const words = text.trim().split(/\s+/);
            document.getElementById('wordCount').innerText = text.trim() === '' ? 0 : words.length;
        }
    </script>
</body>
    </html>
